<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Simulator Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: 1px solid rgba(0, 0, 0, 0.125);
        }
        .log-container {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            max-height: 400px;
            overflow-y: auto;
            padding: 1rem;
            border-radius: 0.375rem;
        }
        .response-container {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            max-height: 300px;
            overflow-y: auto;
            padding: 1rem;
            border-radius: 0.375rem;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }
        .status-connected {
            color: #198754;
        }
        .status-disconnected {
            color: #dc3545;
        }
        .btn-command {
            margin: 0.25rem;
        }
        .command-group {
            margin-bottom: 1rem;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .card-header {
            background-color: #e9ecef;
            border-bottom: 1px solid #dee2e6;
            font-weight: 600;
        }
        pre {
            background-color: transparent;
            border: none;
            padding: 0;
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-microchip"></i> ESP32 Simulator Web UI
            </a>
            <div class="d-flex">
                <span id="connectionStatus" class="navbar-text me-3">
                    <i class="fas fa-circle status-disconnected"></i> Disconnected
                </span>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Connection Settings -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-plug"></i> Connection Settings
                    </div>
                    <div class="card-body">
                        <form id="connectionForm" class="row g-3">
                            <div class="col-md-3">
                                <label for="port" class="form-label">Serial Port</label>
                                <input type="text" class="form-control" id="port" value="COM3" required>
                            </div>
                            <div class="col-md-3">
                                <label for="baudrate" class="form-label">Baud Rate</label>
                                <select class="form-select" id="baudrate">
                                    <option value="9600">9600</option>
                                    <option value="19200">19200</option>
                                    <option value="38400">38400</option>
                                    <option value="57600">57600</option>
                                    <option value="115200" selected>115200</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label for="format" class="form-label">Data Format</label>
                                <select class="form-select" id="format">
                                    <option value="json" selected>JSON</option>
                                    <option value="msgpack">MessagePack</option>
                                </select>
                            </div>
                            <div class="col-md-3 d-flex align-items-end">
                                <button type="button" id="connectBtn" class="btn btn-success me-2">
                                    <i class="fas fa-plug"></i> Connect
                                </button>
                                <button type="button" id="disconnectBtn" class="btn btn-danger" disabled>
                                    <i class="fas fa-plug"></i> Disconnect
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Command Controls -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-mobile-alt"></i> Screen Navigation
                    </div>
                    <div class="card-body">
                        <div class="command-group">
                            <p class="mb-2">Send screen change commands:</p>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Clock"}'>
                                <i class="fas fa-clock"></i> Clock
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Weather"}'>
                                <i class="fas fa-cloud-sun"></i> Weather
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Alarm"}'>
                                <i class="fas fa-bell"></i> Alarm
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Chat"}'>
                                <i class="fas fa-comments"></i> Chat
                            </button>
                        </div>
                        <div class="command-group">
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Music"}'>
                                <i class="fas fa-music"></i> Music Player
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Call"}'>
                                <i class="fas fa-phone"></i> Call
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-command" data-command='{"screen": "Splash"}'>
                                <i class="fas fa-star"></i> Splash
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-database"></i> Data Requests
                    </div>
                    <div class="card-body">
                        <div class="command-group">
                            <p class="mb-2">Request system data:</p>
                            <button type="button" class="btn btn-outline-success btn-command" data-command='{"request": "alarms"}'>
                                <i class="fas fa-bell"></i> Get Alarms
                            </button>
                            <button type="button" class="btn btn-outline-success btn-command" data-command='{"request": "cpu"}'>
                                <i class="fas fa-microchip"></i> Get CPU Metrics
                            </button>
                            <button type="button" class="btn btn-outline-success btn-command" data-command='{"request": "storage"}'>
                                <i class="fas fa-hdd"></i> Get Storage Info
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Custom Command -->
                <div class="card mt-3">
                    <div class="card-header">
                        <i class="fas fa-terminal"></i> Custom Command
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="customCommand" class="form-control" placeholder='{"request": "cpu"}' value='{"request": "cpu"}'>
                            <button type="button" class="btn btn-outline-secondary" id="sendCustomBtn">
                                <i class="fas fa-paper-plane"></i> Send
                            </button>
                        </div>
                        <div class="form-text">
                            Enter a valid JSON command to send to the simulator
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Logs and Responses -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> Communication Logs
                    </div>
                    <div class="card-body">
                        <div id="logContainer" class="log-container">
                            <div class="text-muted">Waiting for connection...</div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary mt-2" id="clearLogsBtn">
                            <i class="fas fa-trash"></i> Clear Logs
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-reply"></i> Responses from ESP32
                    </div>
                    <div class="card-body">
                        <div id="responseContainer" class="response-container">
                            <div class="text-muted">No responses yet...</div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary mt-2" id="clearResponsesBtn">
                            <i class="fas fa-trash"></i> Clear Responses
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let logEventSource = null;
        let responseEventSource = null;

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const logContainer = document.getElementById('logContainer');
        const responseContainer = document.getElementById('responseContainer');
        const customCommand = document.getElementById('customCommand');
        const sendCustomBtn = document.getElementById('sendCustomBtn');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        const clearResponsesBtn = document.getElementById('clearResponsesBtn');

        // Initialize
        updateConnectionStatus();

        // Event listeners
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        sendCustomBtn.addEventListener('click', sendCustomCommand);
        clearLogsBtn.addEventListener('click', () => logContainer.innerHTML = '<div class="text-muted">Logs cleared...</div>');
        clearResponsesBtn.addEventListener('click', () => responseContainer.innerHTML = '<div class="text-muted">Responses cleared...</div>');

        // Command buttons
        document.querySelectorAll('.btn-command').forEach(btn => {
            btn.addEventListener('click', () => {
                const command = btn.getAttribute('data-command');
                sendCommand(JSON.parse(command));
            });
        });

        // Enter key for custom command
        customCommand.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCustomCommand();
            }
        });

        async function connect() {
            const port = document.getElementById('port').value;
            const baudrate = parseInt(document.getElementById('baudrate').value, 10);
            const format = document.getElementById('format').value;

            try {
                const response = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port, baudrate, format })
                });

                const result = await response.json();

                if (result.status === 'connected') {
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    startEventSources();
                    addLog(`✅ Connected to ${result.port} at ${result.baudrate} baud`);
                } else {
                    addLog(`❌ ${result.message}`);
                }
            } catch (error) {
                addLog(`❌ Connection error: ${error.message}`);
            }

            updateConnectionStatus();
        }

        async function disconnect() {
            try {
                const response = await fetch('/api/disconnect', { method: 'POST' });
                const result = await response.json();

                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                stopEventSources();
                addLog('🔌 Disconnected');
            } catch (error) {
                addLog(`❌ Disconnect error: ${error.message}`);
            }

            updateConnectionStatus();
        }

        async function sendCommand(command) {
            try {
                const response = await fetch('/api/send_command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command })
                });

                const result = await response.json();

                if (result.status === 'sent') {
                    addLog(`📤 Sent: ${JSON.stringify(result.command)}`);
                } else {
                    addLog(`❌ ${result.message}`);
                }
            } catch (error) {
                addLog(`❌ Send error: ${error.message}`);
            }
        }

        function sendCustomCommand() {
            const commandText = customCommand.value.trim();
            if (!commandText) return;

            try {
                const command = JSON.parse(commandText);
                sendCommand(command);
            } catch (error) {
                addLog(`❌ Invalid JSON: ${error.message}`);
            }
        }

        function startEventSources() {
            stopEventSources(); // Clean up any existing connections

            logEventSource = new EventSource('/api/logs');
            logEventSource.onmessage = (event) => {
                addLog(event.data);
            };
            logEventSource.onerror = () => {
                addLog('❌ Log stream error');
            };

            responseEventSource = new EventSource('/api/responses');
            responseEventSource.onmessage = (event) => {
                addResponse(event.data);
            };
            responseEventSource.onerror = () => {
                addLog('❌ Response stream error');
            };
        }

        function stopEventSources() {
            if (logEventSource) {
                logEventSource.close();
                logEventSource = null;
            }
            if (responseEventSource) {
                responseEventSource.close();
                responseEventSource = null;
            }
        }

        function addLog(message) {
            const logEntry = document.createElement('div');
            logEntry.textContent = message;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function addResponse(data) {
            try {
                const response = JSON.parse(data);
                const responseEntry = document.createElement('div');
                responseEntry.innerHTML = `<pre>${JSON.stringify(response, null, 2)}</pre>`;
                responseContainer.appendChild(responseEntry);
                responseContainer.scrollTop = responseContainer.scrollHeight;
            } catch (error) {
                const responseEntry = document.createElement('div');
                responseEntry.textContent = data;
                responseContainer.appendChild(responseEntry);
                responseContainer.scrollTop = responseContainer.scrollHeight;
            }
        }

        async function updateConnectionStatus() {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();

                if (status.connected) {
                    connectionStatus.innerHTML = `<i class="fas fa-circle status-connected"></i> Connected to ${status.port}`;
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    if (!logEventSource || !responseEventSource) {
                        startEventSources();
                    }
                } else {
                    connectionStatus.innerHTML = `<i class="fas fa-circle status-disconnected"></i> Disconnected`;
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    stopEventSources();
                }
            } catch (error) {
                connectionStatus.innerHTML = `<i class="fas fa-circle status-disconnected"></i> Error`;
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        // Auto-refresh status every 5 seconds
        setInterval(updateConnectionStatus, 5000);
    </script>
</body>
</html>
